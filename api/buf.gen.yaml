version: v1beta1
plugins:
  - name: go
    out: ./gen/go
    opt: 
      - paths=source_relative

  - name: go-grpc
    out: ./gen/go
    opt: 
      - paths=source_relative
      - require_unimplemented_servers=false

  # - name: gorm
  #   out: ./gen/go
  #   opt:
  #     - paths=source_relative
  #     - engine=postgres

  - name: doc
    out: ./gen/docs/
    opt: html,index.html
    strategy: all

  - name: doc
    out: ./gen/docs/
    opt: markdown,docs.md
    strategy: all

  - name: validate
    out: ./gen/go
    opt:
      - paths=source_relative
      - lang=go

  # js - uses `protoc` standard, and not an individual plugin
  # - name: js
  #   out: ./gen/web
  #   opt: import_style=commonjs

