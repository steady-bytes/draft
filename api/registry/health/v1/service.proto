syntax = "proto3";

package registry.health.v1;

option go_package = "github.com/steady-bytes/draft/api/registry/health/v1";

service HealthService {
    rpc HealthZ(HealthZRequest) returns(HealthZResponse) {}
}

message HealthZRequest {
    bool is_okay = 1;
}

message HealthZResponse {
    bool ok = 1;
}