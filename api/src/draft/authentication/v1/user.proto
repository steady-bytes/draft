syntax = "proto3";

package api;

option go_package = "v1/api";

service User {
  rpc Register(RegisterRequest) returns (RegisterResponse) {}
  rpc Get(UserID) returns (UserDetails) {}
}

message RegisterRequest {
  string name = 1;
  string email = 2;
  string password = 3;
}

message RegisterResponse {
  string id = 1;
  string name = 2;
  string email = 3;
}

message GetRequest {
  oneof filter {
    UserID user_id = 1;
  }
}

message UserID {
  string id = 1;
}
