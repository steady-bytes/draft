syntax = "proto3";

package api;

option go_package = "v1/api";

import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";
import "validate/validate.proto";

///////////
// REGISTRY
///////////

// Process registry
// For a process to connect to the registry it's required to 
// `InitiateHandshake`, and then use the `Handshake` details to `Connect` and stream process details to the registry on a set
// interval notifiing the registry of the processes state
service Registry {
  // Initiate the connection process to the registry. After registration is complete, a process will be able
  // to send and receive messages.
  rpc InitiateHandshake(RequestHandshake) returns (Handshake) {}

  // The process that has joined the cluster must send connections details of it's ability to process requests, or perform the
  // business logic it's supposted to
  rpc ConnectProcess(stream ProcessDetails) returns (Empty) {}

  // Disconnect a process from the registry. When a process disconnects. It will no longer be able to send, or
  // receive a message from the system.
  rpc Disconnect(DisconnectRequest) returns (Disconnected) {}

  // used by external clients to monitor the status of one, or many processes
  rpc Monitor(MonitorRequest) returns (stream Process) {}

  // Query the registries journal of processes
  rpc QuerySystemJournal(JournalQueryRequest) returns (JournalQueryResponse) {}
}

message JournalQueryRequest {
  Query query = 1;
}

message JournalQueryResponse {
  map<string, Process> result = 1;
}

message MonitorRequest {
  Query look_up = 1;
}

message Query {
  oneof option {
    string id = 1;
    string group = 2;
    string all = 3;
  } 
}

message RequestHandshake {
  Process payload = 1;
}

message Handshake {
  // the process_id is assigned when the join request is successful however it does not mean that the process is
  // registered and running.
  string process_id = 1;
  // the address the client must stream it's status messages to
  string leader_address = 2;
  
  Token token = 3;

  string transaction_id = 4 [(validate.rules).string.uuid = true];
}

message ProcessDetails {
  string process_id = 1;
  
  ProcessRunningState running_state = 2;
  ProcessHealthState health_state = 3;
  ProcessKind process_kind = 4;

  string token = 5;
  string nonce = 6;
}

message Empty {}

enum ProcessRunningState {
  INVALID_PROCESS_RUNNING_STATE = 0;
  PROCESS_STARTING = 1;
  PROCESS_TESTING = 2;
  PROCESS_RUNNING = 3;
  PROCESS_DICONNECTED = 4;
}

enum ProcessHealthState {
  INVALID_PROCESS_HEALTH_STATE = 0;
  PROCESS_HEALTHY = 1;
  PROCESS_UNHEALTHY = 2;
}

message DisconnectRequest {
  string process_id = 1 [(validate.rules).string.uuid = true];
}

message Disconnected {
  string process_id = 1 [(validate.rules).string.uuid = true];
}

message Process {
  // id - is a uuid to identify each process of the system
  string id = 1 [(validate.rules).string.uuid = true];
  
  string name = 2;
  string group = 3;
  string local = 4;

  string ip_address = 5;

  ProcessKind process_kind = 6;

  repeated Metadata tags = 7;

  google.protobuf.Timestamp joined_time = 8;
  google.protobuf.Timestamp left_time = 9;
  google.protobuf.Timestamp last_status_time = 10;

  string version = 11;

  ProcessRunningState running_state = 12;
  ProcessHealthState health_state = 13;

  Token token = 14;
}

message Token {
  string id = 1 [(validate.rules).string.uuid = true];
  string jwt = 3;
  string nonce = 4;
}

enum ProcessKind {
  INVALID_PROCESS_KIND = 0;
  AGGREGATE_PROCESS = 1;
  CONSUMER_PROCESS = 2;
  PROJECTION_PROCESS = 3;
  RPC_PROCESS = 4;
  HTTP_PROCESS = 5;
  DEFAULT_PROCESS = 6;
}

message Metadata {
  // id - is a uuid to identify each process of the system
  string id = 1 [(validate.rules).string.uuid = true]; 
  string key = 2;
  string value = 3;
}
