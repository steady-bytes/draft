syntax = "proto3";

package api;

option go_package = "v1/api";

// CRUDLAggregate - A generic interface that can be implemented by any `Aggregate` 
// NOTE: I'm not sure crud really had a place here. It seems like aggregates, and entities are always
// going to need some specific tailoring.
/* service CRUDLAggregate {
 *   rpc Create() returns {}
 *   rpc Read() returns {}
 *   rpc Update() returns {}
 *   rpc Deltete() returns {}
 *   rpc List() returns {}
 * } */
