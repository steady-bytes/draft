message ReadAggreageByIDRequest {
  string aggregate = 1;
}

message ReadAggregateByIDRespose {}

///////
// EVENT_STORE
//////
/* The storage, and routing interface of all `Event`'s in the system.
 * When an event has been emitted it's stored, and routed to the correct event stream */
service EventStore {
  option (gorm.server).autogen = true;
  // Create - Allows a producer to `Emit` an `Event` making the remaing system aware of a change
  // to the system
  rpc Create(CreateEventRequest) returns (CreateEventResponse) {}

  // Snapshot takes a aggregate_id, and a date-time range queries all event's and returns the list of values
  // rpc Snapshot(SnapshotRequest) returns (SnapshotResponse) {}

  // Replay takes a list of events and will replay all event's that don't have the `side_effect` flag enabled.
  // rpc Replay(ReplayRequest) returns (ReplayResponse) {}
}

/* A generic message type that act's as a wrapper for all system events. When an event is `Emit`'ed by a producer
 * the `Event` is stored and forwarded to the correct consumer. */
message Event {
  option (gorm.opts).ormable = true;
  // id - is a uuid to identify each event of the system
  string id = 1 [(validate.rules).string.uuid = true, (gorm.field).tag = {type: "uuid" primary_key: true}];

  // aggregate_id - is the identifier of the aggregate the `Event` relates to.
  string aggregate_id = 2 [(validate.rules).string.uuid = true, (gorm.field).tag = {type: "uuid"}];

  // transaction_id - is a uuid for each transaction that can be used to string together many differnt events to one executed command
  string transaction_id = 3 [(validate.rules).string.uuid = true, (gorm.field).tag = {type: "uuid"}];

  // data - the `data` payload of the event system that can be of any message type
  // the consumer will only be interested in specific types of `Events` from a specifc source.
  // the `event_type` is used as the deserialization/serialization as the type identifier of 
  // the `data` value.
  string data = 4 [(gorm.field).tag = {type: "jsonb"}];
  
  // The datetime when the event was stored
  google.protobuf.Timestamp created_at = 5;

  // The datetime when the event was published to it's event stream for processing
  google.protobuf.Timestamp published_at = 6;

  AggregateKind aggregate_kind = 7 [(validate.rules).enum = {not_in: [0]}];
  EventCode event_code = 8 [(validate.rules).enum = {not_in: [0]}];

  // used to determin reply strategy
  bool side_affect = 9;
}

// Request, and response messages for the `Event` creation
message CreateEventRequest {
  Event payload = 1; 
}

message CreateEventResponse {
  Event result = 1; 
}

// AggregateKind - Is the registered type in the system that defines some kind of data that is stored. Each `Aggregate`
// is mutable through the `Writer`, and readable from the `Reader`.
// 
// An example of this is a `User` aggregate that can will contain default `CRUDL` methods that can be chained together
// to implement any sort of business logic. Secondarly, side effacts can be issued in the form of `Event`s when a specific
// interesting point in time of the aggregates lifespan occures.
// 
// A default topic is created for each `AggregateKind` this allows for a simple decoupling of the data, events, and individual
// `Processes`. In the future this default may be configurable; however, it's currently not. `Queues` also need to be considered
// when implementing a new `AggregateKind`.
enum AggregateKind {
  INVALID_AGGREGATE = 0;
  REGISTRY = 1;
}

enum EventCode {
  INVALID_EVENT_CODE = 0;
  HANDSHAKE_INITIATED = 1;
  PROCESS_CONNECTED = 2;
  PROCESS_DISCONNECTED = 3;
}

// HandshakeInitiated - An event that marks the point in time, and the `address` of the process that 
// has initiated a new connection to the system
message HandshakeInitiated {
  string process_id = 1 [(validate.rules).string.uuid = true];
  string leader_address = 2;
  google.protobuf.Timestamp initiated_time = 3;
}

// ProcessConnected - An event that marks the point in time, of which the process is successful in establishing
// a connection, and registerying is metadata to the registry
message ProcessConnected {
  string process_id = 1 [(validate.rules).string.uuid = true];
  google.protobuf.Timestamp connected_at = 2;
}

// ProcessDisconnected - An event that marks the point in time, of which the process disconnets from the registry.
message ProcessDisconnected {
  string process_id = 1 [(validate.rules).string.uuid = true];
  google.protobuf.Timestamp disconnected_at = 2;
}

///////////
// REGISTRY
///////////

// Process registry
// For a process to connect to the registry it's required to 
// `InitiateHandshake`, and then use the `Handshake` details to `Connect` and stream process details to the registry on a set
// interval notifiing the registry of the processes state
service Registry {
  // Initiate the connection process to the registry. After registration is complete, a process will be able
  // to send and receive messages.
  rpc InitiateHandshake(RequestHandshake) returns (Handshake) {}

  // The process that has joined the cluster must send connections details of it's ability to process requests, or perform the
  // business logic it's supposted to
  rpc ConnectProcess(stream ProcessDetails) returns (Empty) {}

  // Disconnect a process from the registry. When a process disconnects. It will no longer be able to send, or
  // receive a message from the system.
  rpc Disconnect(DisconnectRequest) returns (Disconnected) {}

  // used by external clients to monitor the status of one, or many processes
  rpc Monitor(MonitorRequest) returns (stream Process) {}

  // Query the registries journal of processes
  rpc QuerySystemJournal(JournalQueryRequest) returns (JournalQueryResponse) {}
}

message JournalQueryRequest {
  Query query = 1;
}

message JournalQueryResponse {
  map<string, Process> result = 1;
}

message MonitorRequest {
  Query look_up = 1;
}

message Query {
  oneof option {
    string id = 1;
    string group = 2;
    string all = 3;
  } 
}

message RequestHandshake {
  Process payload = 1;
}

message Handshake {
  // the process_id is assigned when the join request is successful however it does not mean that the process is
  // registered and running.
  string process_id = 1;
  // the address the client must stream it's status messages to
  string leader_address = 2;
  
  Token token = 3;

  string transaction_id = 4 [(validate.rules).string.uuid = true];
}

message ProcessDetails {
  string process_id = 1;
  
  ProcessRunningState running_state = 2;
  ProcessHealthState health_state = 3;
  ProcessKind process_kind = 4;

  string token = 5;
  string nonce = 6;
}

message Empty {}

enum ProcessRunningState {
  INVALID_PROCESS_RUNNING_STATE = 0;
  PROCESS_STARTING = 1;
  PROCESS_TESTING = 2;
  PROCESS_RUNNING = 3;
  PROCESS_DICONNECTED = 4;
}

enum ProcessHealthState {
  INVALID_PROCESS_HEALTH_STATE = 0;
  PROCESS_HEALTHY = 1;
  PROCESS_UNHEALTHY = 2;
}

message DisconnectRequest {
  string process_id = 1 [(validate.rules).string.uuid = true];
}

message Disconnected {
  string process_id = 1 [(validate.rules).string.uuid = true];
}

message Process {
  option (gorm.opts).ormable = true;
  // id - is a uuid to identify each process of the system
  string id = 1 [(validate.rules).string.uuid = true, (gorm.field).tag = {type: "uuid" primary_key: true}];
  
  string name = 2;
  string group = 3;
  string local = 4;

  string ip_address = 5;

  ProcessKind process_kind = 6;

  repeated Metadata tags = 7;

  google.protobuf.Timestamp joined_time = 8 [(gorm.field).tag = {type: "timestamp"}];
  google.protobuf.Timestamp left_time = 9 [(gorm.field).tag = {type: "timestamp"}];
  google.protobuf.Timestamp last_status_time = 10 [(gorm.field).tag = {type: "timestamp"}];

  string version = 11;

  ProcessRunningState running_state = 12;
  ProcessHealthState health_state = 13;

  Token token = 14;
}

message Token {
  option (gorm.opts).ormable = true;

  string id = 1 [(validate.rules).string.uuid = true, (gorm.field).tag = {type: "uuid" primary_key: true}];
  string jwt = 3;
  string nonce = 4;
}

enum ProcessKind {
  INVALID_PROCESS_KIND = 0;
  AGGREGATE_PROCESS = 1;
  CONSUMER_PROCESS = 2;
  PROJECTION_PROCESS = 3;
  RPC_PROCESS = 4;
  HTTP_PROCESS = 5;
  DEFAULT_PROCESS = 6;
}

message Metadata {
  option (gorm.opts).ormable = true;
  // id - is a uuid to identify each process of the system
  string id = 1 [(validate.rules).string.uuid = true, (gorm.field).tag = {type: "uuid" primary_key: true}];
  
  string key = 2;
  string value = 3;
}

